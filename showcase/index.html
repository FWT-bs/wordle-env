<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wordle Bench Showcase</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0c1714;
      --surface: #10241c;
      --surface-2: #152d23;
      --line: #29483b;
      --text: #f3f7f0;
      --muted: #a5baac;
      --green: #5aa469;
      --yellow: #c9a64d;
      --gray: #4e5a53;
      --empty: #1a3329;
      --ink-on-yellow: #20190d;
      --bad: #e07879;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    a { color: #9fd6ad; }

    header {
      border-bottom: 1px solid var(--line);
      background: #0f2119;
    }

    .header-inner {
      width: min(1240px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 16px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    h1 { margin: 0; font-size: 22px; }
    .sub { color: var(--muted); font-size: 14px; margin-top: 3px; }

    .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    input, select {
      height: 36px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #081511;
      color: var(--text);
      padding: 0 10px;
      min-width: 0;
    }
    input[type="file"] { max-width: 210px; padding-top: 7px; font-size: 12px; }

    button {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #d8ead8;
      color: #10241c;
      font-weight: 800;
      padding: 0 12px;
      cursor: pointer;
    }
    button.secondary { background: transparent; color: var(--text); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .shell {
      width: min(1240px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 22px 0;
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 22px;
      align-items: start;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 16px;
    }

    .runs-panel { position: sticky; top: 16px; max-height: calc(100vh - 120px); overflow: auto; }
    .panel-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 12px; }
    h2 { margin: 0; font-size: 15px; }
    h3 { margin: 0 0 10px; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }

    .runs-list { display: grid; gap: 8px; }
    .run-item {
      text-align: left; background: var(--surface-2); border: 1px solid var(--line);
      border-radius: 8px; padding: 10px; cursor: pointer; color: var(--text);
      display: grid; gap: 4px; height: auto; font-weight: 500;
    }
    .run-item.active { border-color: #d8ead8; background: #16332a; }
    .run-item .model { font-size: 13px; font-weight: 800; overflow-wrap: anywhere; }
    .run-item .id { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: var(--muted); }
    .run-item .row { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); }
    .run-item .status { text-transform: uppercase; font-size: 11px; letter-spacing: 0.04em; }
    .status.good { color: var(--green); } .status.bad { color: var(--bad); } .status.live { color: var(--yellow); }
    .runs-empty { color: var(--muted); font-size: 13px; }

    .main { display: grid; gap: 18px; }

    /* Run stats strip */
    .stats { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
    .stat { background: var(--surface-2); border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; }
    .stat .k { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
    .stat .v { font-size: 18px; font-weight: 800; margin-top: 3px; overflow-wrap: anywhere; }
    .pill { display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: 12px; font-weight: 800; border: 1px solid var(--line); }
    .pill.good { background: rgba(90,164,105,0.18); color: #9fe0ad; border-color: var(--green); }
    .pill.bad { background: rgba(224,120,121,0.16); color: #f0a6a6; border-color: var(--bad); }
    .pill.live { background: rgba(201,166,77,0.16); color: #e8cf8c; border-color: var(--yellow); }

    /* Episodes */
    .episodes { display: flex; gap: 8px; flex-wrap: wrap; }
    .ep {
      text-align: left; background: var(--surface-2); border: 1px solid var(--line);
      border-radius: 8px; padding: 8px 11px; cursor: pointer; color: var(--text);
      display: grid; gap: 2px; min-width: 132px;
    }
    .ep.active { border-color: #d8ead8; background: #16332a; }
    .ep .epname { font-size: 12px; color: var(--muted); }
    .ep .epout { font-size: 14px; font-weight: 800; display: flex; align-items: center; gap: 6px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; background: var(--gray); }
    .dot.good { background: var(--green); } .dot.bad { background: var(--bad); }
    .ans { font-family: ui-monospace, Menlo, monospace; text-transform: uppercase; letter-spacing: 0.06em; }

    /* Play area */
    .play { display: grid; grid-template-columns: minmax(320px, 1.1fr) 1fr; gap: 18px; }
    .controls { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .controls .steplabel { font-weight: 800; font-size: 14px; min-width: 96px; }
    .timeline { display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto; }
    .step { min-width: 34px; height: 32px; border-radius: 6px; border: 1px solid var(--line); background: transparent; color: var(--text); cursor: pointer; font-weight: 800; padding: 0 6px; }
    .step.active { background: #d8ead8; color: #10241c; border-color: #d8ead8; }
    .step.win.active { background: var(--green); border-color: var(--green); color: #fff; }

    .board { display: grid; gap: 8px; margin: 4px 0 10px; }
    .brow { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .brow.active .tile { box-shadow: 0 0 0 2px #d8ead8; }
    .tile {
      aspect-ratio: 1; max-width: 62px; display: grid; place-items: center;
      border: 1px solid var(--line); border-radius: 6px; background: var(--empty);
      font-weight: 800; font-size: 26px; text-transform: uppercase;
    }
    .tile.green { background: var(--green); border-color: var(--green); }
    .tile.yellow { background: var(--yellow); border-color: var(--yellow); color: var(--ink-on-yellow); }
    .tile.gray { background: var(--gray); border-color: var(--gray); }

    .caption { background: var(--surface-2); border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; font-size: 14px; }
    .caption b { color: #fff; }

    .outcome { display: grid; gap: 12px; }
    .answer-card { background: var(--surface-2); border: 1px solid var(--line); border-radius: 10px; padding: 14px; }
    .answer-card .big { font-size: 30px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; font-family: ui-monospace, Menlo, monospace; margin-top: 4px; }
    .answer-card.win { border-color: var(--green); }
    .answer-card.loss { border-color: var(--bad); }
    .facts { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
    .facts .k { color: var(--muted); font-size: 11px; text-transform: uppercase; }
    .facts .v { font-weight: 800; }

    .words { display: flex; flex-wrap: wrap; gap: 6px; }
    .word { border: 1px solid var(--line); border-radius: 999px; padding: 4px 9px; color: var(--muted); font-family: ui-monospace, Menlo, monospace; font-size: 12px; }
    .word.answer { color: #10241c; background: var(--green); border-color: var(--green); font-weight: 800; }

    .legend { display: flex; gap: 14px; flex-wrap: wrap; font-size: 12px; color: var(--muted); }
    .legend span { display: inline-flex; align-items: center; gap: 6px; }
    .swatch { width: 14px; height: 14px; border-radius: 3px; display: inline-block; }
    .swatch.green { background: var(--green); } .swatch.yellow { background: var(--yellow); } .swatch.gray { background: var(--gray); }

    .message { color: var(--muted); font-size: 13px; min-height: 18px; }
    .notice { color: var(--muted); font-size: 13px; }

    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; }
      .runs-panel { position: static; max-height: none; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .play { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div>
        <h1>Wordle Bench Showcase</h1>
        <div class="sub" id="run-sub">Loading runs...</div>
      </div>
      <div class="toolbar">
        <input id="run-id" placeholder="run id" size="14" />
        <button id="load-run">Load</button>
        <input id="file" type="file" accept="application/json,.json" />
      </div>
    </div>
  </header>

  <div class="shell">
    <section class="panel runs-panel">
      <div class="panel-head">
        <h2>Runs</h2>
        <div class="toolbar">
          <button id="fetch-recent" class="secondary" title="Fetch recent runs from the API">Fetch</button>
          <button id="refresh-runs" class="secondary" title="Reload runs.json">↻</button>
        </div>
      </div>
      <div class="runs-list" id="runs-list"><p class="runs-empty">Loading run index...</p></div>
    </section>

    <main class="main">
      <section class="stats" id="stats"></section>

      <section class="panel">
        <h3>Episodes</h3>
        <div class="episodes" id="episodes"></div>
      </section>

      <section class="panel">
        <div class="play">
          <div>
            <div class="controls">
              <button id="prev" class="secondary" title="Previous guess (←)">◀</button>
              <button id="play" title="Replay from start (space)">▶ Play</button>
              <button id="next" class="secondary" title="Next guess (→)">▶</button>
              <span class="steplabel" id="steplabel">Step 0 / 0</span>
              <div class="timeline" id="timeline"></div>
            </div>
            <div class="board" id="board"></div>
            <div class="caption" id="caption"></div>
          </div>

          <div class="outcome">
            <div class="answer-card" id="answer-card">
              <h3 style="margin-bottom:2px">Answer</h3>
              <div class="big" id="answer">—</div>
              <div class="facts" id="ep-facts"></div>
            </div>
            <div>
              <h3>Candidate Words</h3>
              <div class="words" id="words"></div>
            </div>
            <div class="legend">
              <span><i class="swatch green"></i> right spot</span>
              <span><i class="swatch yellow"></i> wrong spot</span>
              <span><i class="swatch gray"></i> not in word</span>
            </div>
          </div>
        </div>
        <div class="message" id="message" style="margin-top:12px"></div>
      </section>
    </main>
  </div>

  <script>
    const API_BASE = "https://api.swecc.org/bench";
    const RUNS_INDEX_PATH = "data/runs.json";
    const SAMPLE_PATH = "data/replay.json";
    const DEFAULT_DOMAIN_ID = "85ec56ce-8e26-40d9-bfbb-879097f8d958"; // Wordle (FWT-bs/wordle-env prod domain)
    const RECENT_LIMIT = 20;

    const state = { data: null, index: [], activeRunId: null, episodeId: null, stepIndex: 0, playing: false, timer: null };
    const $ = (id) => document.getElementById(id);

    /* ---------- helpers ---------- */
    const shortId = (id) => String(id || "").slice(0, 8);
    const escapeHtml = (v) => String(v).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[c]));
    const statusTone = (s) => (s === "completed" ? "good" : s === "failed" || s === "cancelled" ? "bad" : s === "running" ? "live" : "");
    const fmtScore = (v) => (typeof v === "number" ? (Number.isInteger(v) ? String(v) : v.toFixed(3)) : v == null ? "—" : String(v));
    const isWon = (ti) => ti && (ti.won === "1.0" || ti.won === 1 || ti.won === true || ti.won === "1");
    const setMessage = (t) => { $("message").textContent = t || ""; };

    /* ---------- run index / loading (unchanged behaviour) ---------- */
    function getParam(name) { return new URLSearchParams(window.location.search).get(name); }

    function normalizeApiRun(run) {
      return {
        id: run.id,
        domain: run.config?.domain_id === DEFAULT_DOMAIN_ID ? "Wordle" : run.config?.domain_id,
        model: run.config?.agent_config?.model, status: run.status,
        scores: run.scores || {}, episodes: run.config?.num_episodes,
        created_at: run.created_at, source: "api",
      };
    }
    function mergeIndex(existing, fetched) {
      const byId = new Map();
      for (const e of existing) byId.set(e.id, e);
      for (const e of fetched) { const prev = byId.get(e.id) || {}; byId.set(e.id, { ...e, ...prev, ...e, file: prev.file }); }
      return Array.from(byId.values()).sort((a, b) => (b.created_at || "").localeCompare(a.created_at || ""));
    }
    async function fetchRecentRuns() {
      const domainId = getParam("domain") || DEFAULT_DOMAIN_ID;
      setMessage(`Fetching recent runs for ${shortId(domainId)}...`);
      const r = await fetch(`${API_BASE}/v1/runs?domain_id=${encodeURIComponent(domainId)}`, { credentials: "omit" });
      if (!r.ok) throw new Error(`API returned ${r.status}`);
      const runs = await r.json();
      if (!Array.isArray(runs)) throw new Error("Unexpected /v1/runs shape.");
      state.index = mergeIndex(state.index, runs.map(normalizeApiRun).filter((x) => x.id).slice(0, RECENT_LIMIT));
      renderRunsList();
      setMessage(`Loaded ${Math.min(runs.length, RECENT_LIMIT)} run(s) from the API.`);
    }
    async function loadIndex() {
      try {
        const r = await fetch(RUNS_INDEX_PATH, { cache: "no-store" });
        if (!r.ok) { state.index = []; renderRunsList(); return []; }
        const payload = await r.json();
        state.index = Array.isArray(payload.runs) ? payload.runs : [];
      } catch { state.index = []; }
      renderRunsList();
      return state.index;
    }
    async function loadInitial() {
      const entries = await loadIndex();
      const runId = getParam("run");
      if (runId) { $("run-id").value = runId; return loadRun(runId); }
      if (entries.length) return loadRun(entries[0].id);
      return loadFromPath(SAMPLE_PATH);
    }
    async function loadRun(runId) {
      if (!runId) return;
      setMessage("Loading run export...");
      state.activeRunId = runId; renderRunsList();
      const entry = state.index.find((r) => r.id === runId);
      if (entry?.file) {
        try {
          const r = await fetch(`data/${entry.file}`, { cache: "no-store" });
          if (r.ok) return setReplay(await r.json(), `Loaded ${shortId(runId)} from showcase.`);
        } catch { /* fall through */ }
      }
      const r = await fetch(`${API_BASE}/v1/runs/${encodeURIComponent(runId)}/export`);
      if (!r.ok) throw new Error(`Could not fetch run export (${r.status}).`);
      setReplay(await r.json(), `Loaded ${shortId(runId)} from API.`);
    }
    async function loadFromPath(path) {
      const r = await fetch(path, { cache: "no-store" });
      if (!r.ok) throw new Error(`Could not load ${path}.`);
      setReplay(await r.json(), "Loaded local replay data.");
    }

    /* ---------- derived accessors ---------- */
    const episodeRecords = () => state.data?.episodes || [];
    const replayMap = () => state.data?.replay || {};
    const turnsFor = (eid) => replayMap()[eid] || [];
    const currentTurns = () => turnsFor(state.episodeId);
    const currentEpisodeRecord = () => episodeRecords().find((e) => e.id === state.episodeId) || null;
    const boardOf = (turn) => turn?.board_after || turn?.observation || turn?.board_before || {};

    function setReplay(data, message) {
      state.data = data;
      stopPlay();
      const ids = Object.keys(data.replay || {});
      // default to the first episode, shown at its FINAL step (full board visible).
      selectEpisode(ids[0] || null, /*toEnd*/ true, /*render*/ false);
      renderRunsList();
      renderStats();
      renderEpisodes();
      render();
      setMessage(message);
      const run = data.run || {};
      const model = run.config?.agent_config?.model || "unknown model";
      const wr = (run.scores || run.aggregate_scores || {}).win_rate;
      $("run-sub").textContent = `${data.domain_name || "Wordle"} · ${model}` + (wr != null ? ` · win rate ${fmtScore(wr)}` : "");
    }

    function selectEpisode(eid, toEnd, doRender = true) {
      state.episodeId = eid;
      const n = turnsFor(eid).length;
      state.stepIndex = toEnd ? Math.max(0, n - 1) : 0;
      if (doRender) { renderEpisodes(); render(); }
    }

    /* ---------- rendering ---------- */
    function renderRunsList() {
      if (!state.index.length) { $("runs-list").innerHTML = `<p class="runs-empty">No runs in <code>data/runs.json</code>.</p>`; return; }
      $("runs-list").innerHTML = state.index.map((e) => {
        const active = e.id === state.activeRunId ? " active" : "";
        const s = e.status || "unknown";
        const score = e.scores?.win_rate ?? e.scores?.average_reward;
        return `<button class="run-item${active}" data-run-id="${escapeHtml(e.id)}">
          <span class="model">${escapeHtml(e.model || "unknown model")}</span>
          <span class="id">${escapeHtml(shortId(e.id))} · ${escapeHtml(String(e.episodes ?? "?"))} eps</span>
          <span class="row"><span class="status ${statusTone(s)}">${escapeHtml(s)}</span><span>${score == null ? "" : "win " + fmtScore(score)}</span></span>
        </button>`;
      }).join("");
    }

    function renderStats() {
      const run = state.data?.run || {};
      const eps = episodeRecords();
      const scores = run.scores || run.aggregate_scores || {};
      const won = eps.filter((e) => isWon(e.terminal_info)).length;
      const stepsArr = eps.map((e) => Number(e.steps)).filter((n) => !isNaN(n));
      const avg = stepsArr.length ? (stepsArr.reduce((a, b) => a + b, 0) / stepsArr.length) : null;
      const tokens = eps.reduce((a, e) => a + (Number(e.terminal_info?.total_tokens) || 0), 0);
      const cells = [
        ["Model", escapeHtml(run.config?.agent_config?.model || "—")],
        ["Status", `<span class="pill ${statusTone(run.status)}">${escapeHtml(run.status || "—")}</span>`],
        ["Episodes", `${won}/${eps.length} won`],
        ["Win rate", fmtScore(scores.win_rate)],
        ["Avg guesses", avg == null ? "—" : avg.toFixed(1)],
        ["Tokens", tokens ? tokens.toLocaleString() : "—"],
      ];
      $("stats").innerHTML = cells.map(([k, v]) => `<div class="stat"><div class="k">${k}</div><div class="v">${v}</div></div>`).join("");
    }

    function renderEpisodes() {
      const eps = episodeRecords();
      if (!eps.length) { $("episodes").innerHTML = `<p class="notice">No episodes in this run.</p>`; return; }
      $("episodes").innerHTML = eps.map((e, i) => {
        const ti = e.terminal_info || {};
        const won = isWon(ti);
        const active = e.id === state.episodeId ? " active" : "";
        const failed = e.status === "failed";
        const outcome = failed ? "failed" : won ? `solved in ${ti.guesses_used ?? e.steps}` : "lost";
        const ans = ti.answer ? `<span class="ans">${escapeHtml(ti.answer)}</span>` : "";
        return `<button class="ep${active}" data-ep="${escapeHtml(e.id)}">
          <span class="epname">Episode ${i + 1}</span>
          <span class="epout"><span class="dot ${failed ? "bad" : won ? "good" : "bad"}"></span>${ans || escapeHtml(outcome)}</span>
          <span class="epname">${escapeHtml(outcome)}</span>
        </button>`;
      }).join("");
    }

    function render() {
      const turns = currentTurns();
      const ep = currentEpisodeRecord();
      const ti = ep?.terminal_info || {};
      const n = turns.length;
      if (state.stepIndex > n - 1) state.stepIndex = Math.max(0, n - 1);
      const turn = turns[state.stepIndex] || null;

      // step controls
      $("steplabel").textContent = n ? `Step ${state.stepIndex + 1} / ${n}` : "No steps";
      $("prev").disabled = state.stepIndex <= 0;
      $("next").disabled = state.stepIndex >= n - 1;
      $("timeline").innerHTML = turns.map((t, i) => {
        const win = isWon(t.info) || (i === n - 1 && isWon(ti));
        return `<button class="step${i === state.stepIndex ? " active" : ""}${win ? " win" : ""}" data-step="${i}">${t.step ?? i + 1}</button>`;
      }).join("");

      renderBoard(boardOf(turn), state.stepIndex, ti.answer);
      renderCaption(turn, state.stepIndex, n, ti);
      renderOutcome(ep, ti);

      const obs = boardOf(turn);
      $("words").innerHTML = (obs.candidate_words || []).map((w) =>
        `<span class="word${ti.answer && w.toLowerCase() === String(ti.answer).toLowerCase() ? " answer" : ""}">${escapeHtml(w)}</span>`).join("");
    }

    function renderBoard(obs, activeRow, answer) {
      const maxGuesses = obs.max_guesses || 6;
      const hist = obs.history || [];
      const rows = hist.map((row) => {
        if (row.valid === false) return { invalid: true, guess: row.guess || "", tiles: [] };
        return { invalid: false, tiles: row.feedback || row.tiles || [] };
      });
      while (rows.length < maxGuesses) rows.push({ empty: true, tiles: Array.from({ length: 5 }, () => ({ letter: "", mark: "empty" })) });

      $("board").innerHTML = rows.map((row, idx) => {
        const tiles = row.invalid
          ? Array.from({ length: 5 }, (_, i) => ({ letter: (row.guess || "")[i] || "", mark: "gray" }))
          : row.tiles;
        const cells = tiles.map((t) => `<div class="tile ${t.mark || "empty"}">${escapeHtml(t.letter || "")}</div>`).join("");
        return `<div class="brow${idx === activeRow ? " active" : ""}">${cells}</div>`;
      }).join("");
    }

    function renderCaption(turn, idx, n, ti) {
      if (!turn) { $("caption").innerHTML = `<span class="notice">This run has no step traces to replay.</span>`; return; }
      const guess = turn.action?.guess || turn.action || "?";
      const solvedHere = isWon(turn.info);
      const terminal = turn.terminated || turn.truncated || idx === n - 1;
      let tail;
      if (solvedHere) tail = `<b>solved!</b> the word was <b class="ans">${escapeHtml(ti.answer || guess)}</b>`;
      else if (terminal) tail = `episode ended — the word was <b class="ans">${escapeHtml(ti.answer || "?")}</b>`;
      else tail = `reward ${fmtScore(turn.reward)} · ${boardOf(turn).guesses_remaining ?? "?"} guesses left`;
      $("caption").innerHTML = `Guess ${idx + 1}: <b class="ans">${escapeHtml(String(guess).toUpperCase())}</b> — ${tail}`;
    }

    function renderOutcome(ep, ti) {
      const card = $("answer-card");
      const failed = ep?.status === "failed";
      const won = isWon(ti);
      card.className = "answer-card" + (failed ? " loss" : won ? " win" : ti.answer ? " loss" : "");
      $("answer").textContent = ti.answer ? String(ti.answer).toUpperCase() : failed ? "FAILED" : "—";
      const facts = [
        ["Result", failed ? "failed" : won ? "solved ✓" : "lost ✗"],
        ["Guesses", ti.guesses_used ?? ep?.steps ?? "—"],
        ["Reward", ep?.total_reward ?? "—"],
        ["Tokens", ti.total_tokens ? Number(ti.total_tokens).toLocaleString() : "—"],
      ];
      $("ep-facts").innerHTML = facts.map(([k, v]) => `<div><div class="k">${k}</div><div class="v">${escapeHtml(String(v))}</div></div>`).join("");
      if (failed && ti.error) $("ep-facts").innerHTML += `<div style="grid-column:1/-1"><div class="k">Error</div><div class="v" style="color:var(--bad);font-weight:600;font-size:12px">${escapeHtml(String(ti.error).split("\n")[0].slice(0, 160))}</div></div>`;
    }

    /* ---------- step navigation ---------- */
    function goto(i) {
      const n = currentTurns().length;
      state.stepIndex = Math.max(0, Math.min(i, n - 1));
      render();
    }
    function stopPlay() { state.playing = false; clearInterval(state.timer); state.timer = null; $("play").textContent = "▶ Play"; }
    function play() {
      if (state.playing) return stopPlay();
      const n = currentTurns().length;
      if (!n) return;
      if (state.stepIndex >= n - 1) state.stepIndex = 0;
      state.playing = true; $("play").textContent = "⏸ Pause"; render();
      state.timer = setInterval(() => {
        if (state.stepIndex >= currentTurns().length - 1) return stopPlay();
        state.stepIndex += 1; render();
      }, 1100);
    }

    /* ---------- events ---------- */
    $("timeline").addEventListener("click", (e) => { const b = e.target.closest("button[data-step]"); if (b) { stopPlay(); goto(Number(b.dataset.step)); } });
    $("episodes").addEventListener("click", (e) => { const b = e.target.closest("button[data-ep]"); if (b) { stopPlay(); selectEpisode(b.dataset.ep, true); } });
    $("runs-list").addEventListener("click", async (e) => { const b = e.target.closest("button[data-run-id]"); if (b) { try { await loadRun(b.dataset.runId); } catch (err) { setMessage(err.message); } } });
    $("prev").addEventListener("click", () => { stopPlay(); goto(state.stepIndex - 1); });
    $("next").addEventListener("click", () => { stopPlay(); goto(state.stepIndex + 1); });
    $("play").addEventListener("click", play);
    $("load-run").addEventListener("click", async () => { try { await loadRun($("run-id").value.trim()); } catch (err) { setMessage(err.message); } });
    $("refresh-runs").addEventListener("click", async () => { await loadIndex(); setMessage(state.index.length ? `Index has ${state.index.length} run(s).` : "Index empty."); });
    $("fetch-recent").addEventListener("click", async () => { try { await fetchRecentRuns(); } catch (err) { setMessage(`Fetch failed: ${err.message}`); } });
    $("file").addEventListener("change", async () => { const f = $("file").files?.[0]; if (!f) return; try { setReplay(JSON.parse(await f.text()), `Loaded ${f.name}.`); } catch (err) { setMessage(err.message); } });
    document.addEventListener("keydown", (e) => {
      if (["INPUT", "SELECT", "TEXTAREA"].includes(document.activeElement?.tagName)) return;
      if (e.key === "ArrowRight") { stopPlay(); goto(state.stepIndex + 1); }
      else if (e.key === "ArrowLeft") { stopPlay(); goto(state.stepIndex - 1); }
      else if (e.key === " ") { e.preventDefault(); play(); }
    });

    loadInitial().catch((err) => { setMessage(err.message); $("run-sub").textContent = "No run loaded"; });
  </script>
</body>
</html>
